name: Release Maktabah

on:
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      # Checkout source
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      # Pilih Xcode
      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      # Tentukan tag
      - name: Set Tag Name
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "TAG_NAME=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      # Nama produk
      - name: Set Product Name
        id: vars
        run: echo "PRODUCT_NAME=Maktabah" >> $GITHUB_OUTPUT

      # Install Apple Certificate
      - name: Install Apple Certificate
        env:
          P12_DATA: ${{ secrets.P12_DATA }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_DATA" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      # Build archive macOS
      - name: Build archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project Maktabah.xcodeproj \
            -scheme Maktabah-Direct \
            -archivePath "build/Maktabah.xcarchive" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime"

      - name: Export Developer ID App
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "build/Maktabah.xcarchive" \
            -exportPath "build/exported" \
            -exportOptionsPlist "build/ExportOptions.plist"

      # Notarisasi App
      - name: Notarize App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Zip dengan ditto agar symlink tetap intact
          ditto -c -k --sequesterRsrc --keepParent \
            "build/exported/Maktabah.app" \
            "Maktabah_Notarize.zip"

          # Kirim ke Apple Notary Service
          xcrun notarytool submit "Maktabah_Notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait \
            --output-format json > notarize-result.json

          cat notarize-result.json

          SUBMISSION_ID=$(/usr/bin/python3 -c 'import json; print(json.load(open("notarize-result.json"))["id"])')
          STATUS=$(/usr/bin/python3 -c 'import json; print(json.load(open("notarize-result.json"))["status"])')

          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID"

          if [[ "$STATUS" != "Accepted" ]]; then
            echo "Notarization failed with status: $STATUS"
            exit 1
          fi

          # Tempelkan tiket notarisasi (Stapling)
          xcrun stapler staple "build/exported/Maktabah.app"

      # Package app dengan ditto (jaga symlink)
      - name: Package app
        run: |
          ZIP_NAME="${{ steps.vars.outputs.PRODUCT_NAME }}-${{ steps.tag.outputs.TAG_NAME }}.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            "build/exported/Maktabah.app" \
            "build/${ZIP_NAME}"

      # Upload ke GitHub Release
      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          files: build/${{ steps.vars.outputs.PRODUCT_NAME }}-${{ steps.tag.outputs.TAG_NAME }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Generate appcast.xml dengan Sparkle
      - name: Generate Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Cari generate_appcast dari Sparkle package
          SPARKLE_BIN=$(find ~/Library/Developer/Xcode/DerivedData -name "generate_appcast" 2>/dev/null | head -1)
          if [[ -z "$SPARKLE_BIN" ]]; then
            echo "ERROR: generate_appcast tidak ditemukan"
            exit 1
          fi

          # Siapkan folder staging berisi zip
          mkdir -p build/sparkle_staging
          cp "build/${{ steps.vars.outputs.PRODUCT_NAME }}-${{ steps.tag.outputs.TAG_NAME }}.zip" \
             build/sparkle_staging/

          # Generate appcast.xml
          echo "$SPARKLE_PRIVATE_KEY" | base64 --decode | "$SPARKLE_BIN" \
            --ed-key-file - \
            --download-url-prefix \
            "https://github.com/bismillah-100/Maktabah/releases/download/${{ steps.tag.outputs.TAG_NAME }}/" \
            build/sparkle_staging/

          # Simpan appcast.xml ke root workspace
          cp build/sparkle_staging/appcast.xml appcast.xml
          echo "appcast.xml berhasil dibuat:"
          cat appcast.xml

      # Push appcast.xml ke branch gh-pages
      - name: Deploy Appcast to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/maktabah-gh-pages
          git fetch origin gh-pages
          git worktree add /tmp/maktabah-gh-pages origin/gh-pages

          cp appcast.xml /tmp/maktabah-gh-pages/appcast.xml

          cd /tmp/maktabah-gh-pages
          git add appcast.xml

          if git diff --cached --quiet; then
            echo "No appcast changes to publish."
            exit 0
          fi

          git commit -m "appcast: ${{ steps.tag.outputs.TAG_NAME }}"
          git push origin HEAD:gh-pages
