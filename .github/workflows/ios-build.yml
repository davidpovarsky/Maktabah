name: iOS Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_PATH: Maktabah.xcodeproj
  SCHEME: Maktabah-iOS
  CONFIGURATION: Release
  PRODUCT_NAME: Maktabah

jobs:
  build-ios:
    name: Build iOS artifacts
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          set -euo pipefail
          echo "Installed Xcode apps:"
          ls -1 /Applications | grep '^Xcode' || true

          XCODE_PATH=$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -n 1 || true)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::Xcode 26 was not found on this GitHub runner. Use a runner image that includes Xcode 26, or build on a self-hosted Mac with Xcode 26."
            exit 1
          fi

          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Cache Otzaria search engine
        id: cache-otzaria-search-engine
        if: hashFiles('Vendor/OtzariaSearchEngine/build_xcframework.sh') != ''
        uses: actions/cache@v4
        with:
          path: |
            Vendor/OtzariaSearchEngine/OtzariaSearchEngine.xcframework
            Vendor/OtzariaSearchEngine/ios_bridge/target
            Vendor/OtzariaSearchEngine/upstream/otzaria_search_engine
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-otzaria-search-${{ hashFiles('Vendor/OtzariaSearchEngine/build_xcframework.sh', 'Vendor/OtzariaSearchEngine/ios_bridge/Cargo.toml', 'Vendor/OtzariaSearchEngine/ios_bridge/Cargo.lock', 'Vendor/OtzariaSearchEngine/ios_bridge/src/lib.rs', 'Vendor/OtzariaSearchEngine/include/otzaria_search_engine.h', 'Vendor/OtzariaSearchEngine/module.modulemap') }}

      - name: Install Rust toolchain
        if: hashFiles('Vendor/OtzariaSearchEngine/build_xcframework.sh') != '' && steps.cache-otzaria-search-engine.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build Otzaria Tantivy search engine
        if: hashFiles('Vendor/OtzariaSearchEngine/build_xcframework.sh') != '' && steps.cache-otzaria-search-engine.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p build/logs
          chmod +x Vendor/OtzariaSearchEngine/build_xcframework.sh
          Vendor/OtzariaSearchEngine/build_xcframework.sh 2>&1 | tee build/logs/build-otzaria-search-engine.log

      - name: Verify Otzaria search engine framework
        if: hashFiles('Vendor/OtzariaSearchEngine/build_xcframework.sh') != ''
        run: |
          set -euo pipefail
          test -d Vendor/OtzariaSearchEngine/OtzariaSearchEngine.xcframework

      - name: Install Rust toolchain for Zayit Search
        if: hashFiles('Vendor/ZayitSearchPort/Scripts/build-ios-xcframework.sh') != ''
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Zayit Search engine
        id: cache-zayit-search-engine
        if: hashFiles('Vendor/ZayitSearchPort/Scripts/build-ios-xcframework.sh') != ''
        uses: actions/cache@v4
        with:
          path: |
            Vendor/ZayitSearchPort/build/MaktabahZayitSearch.xcframework
            Vendor/ZayitSearchPort/Rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-zayit-search-${{ hashFiles('Vendor/ZayitSearchPort/Rust/Cargo.toml', 'Vendor/ZayitSearchPort/Rust/Cargo.lock', 'Vendor/ZayitSearchPort/Rust/src/**', 'Vendor/ZayitSearchPort/Rust/include/**', 'Vendor/ZayitSearchPort/Scripts/build-ios-xcframework.sh') }}

      - name: Build Zayit Search XCFramework
        if: hashFiles('Vendor/ZayitSearchPort/Scripts/build-ios-xcframework.sh') != '' && steps.cache-zayit-search-engine.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p build/logs
          bash Vendor/ZayitSearchPort/Scripts/build-ios-xcframework.sh 2>&1 | tee build/logs/build-zayit-search-engine.log

      - name: Verify Zayit Search XCFramework
        if: hashFiles('Vendor/ZayitSearchPort/Scripts/build-ios-xcframework.sh') != ''
        run: |
          set -euo pipefail
          test -d Vendor/ZayitSearchPort/build/MaktabahZayitSearch.xcframework

      - name: Cache Swift package dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            build/DerivedData/SourcePackages
            build/DerivedData-iphoneos/SourcePackages
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Maktabah.xcodeproj/project.pbxproj') }}

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-ruby-gems-xcodeproj-v1

      - name: Add isolated search sources to iOS target
        run: |
          set -euo pipefail
          mkdir -p build/logs

          if [ ! -d Source/Otzaria ]; then
            echo "Source/Otzaria was not found; building the original iOS target."
            exit 0
          fi

          gem install xcodeproj --no-document --install-dir vendor/bundle
          export GEM_HOME="$PWD/vendor/bundle"
          export GEM_PATH="$PWD/vendor/bundle"
          export PATH="$PWD/vendor/bundle/bin:$PATH"

          ruby <<'RUBY'
          require 'xcodeproj'

          project = Xcodeproj::Project.open('Maktabah.xcodeproj')
          target = project.targets.find { |item| item.name == 'Maktabah-iOS' }
          abort('Maktabah-iOS target was not found') unless target

          existing_refs = target.source_build_phase.files_references.compact
          Dir.glob('Source/Otzaria/**/*.swift').sort.reject { |path|
            path.start_with?('Source/Otzaria/Experimental/')
          }.each do |path|
            file_ref = project.files.find { |ref| ref.path == path }
            file_ref ||= project.main_group.new_file(path)
            unless existing_refs.include?(file_ref)
              target.add_file_references([file_ref])
              existing_refs << file_ref
              puts "Added #{path} to #{target.name}"
            end
          end

          framework_path = 'Vendor/OtzariaSearchEngine/OtzariaSearchEngine.xcframework'
          if File.exist?(framework_path)
            framework_ref = project.files.find { |ref| ref.path == framework_path }
            framework_ref ||= project.main_group.new_file(framework_path)
            linked_refs = target.frameworks_build_phase.files_references.compact
            unless linked_refs.include?(framework_ref)
              target.frameworks_build_phase.add_file_reference(framework_ref)
              puts "Linked #{framework_path} to #{target.name}"
            end
          else
            abort("#{framework_path} was not found. Build the Otzaria search engine before xcodebuild.")
          end

          project.save
          RUBY

          ruby Vendor/ZayitSearchPort/Scripts/configure-xcode.rb

      - name: List schemes
        run: |
          xcodebuild -list -project "$PROJECT_PATH"

      - name: Resolve packages
        run: |
          set -o pipefail
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" 2>&1 | tee build/logs/resolve-packages.log

      - name: Build simulator app without signing
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 2>&1 | tee build/logs/build-simulator.log

          APP_PATH="build/DerivedData/Build/Products/Debug-iphonesimulator/${PRODUCT_NAME}.app"
          test -d "$APP_PATH"
          bash Scripts/verify-embedded-frameworks.sh "$APP_PATH" \
            | tee build/logs/verify-simulator-frameworks.log
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "${PRODUCT_NAME}-simulator-app.zip"

      - name: Launch simulator app and verify it stays alive
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Debug-iphonesimulator/${PRODUCT_NAME}.app"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")
          SIMULATOR_UDID=$(xcrun simctl list devices available -j | /usr/bin/python3 -c '
          import json
          import sys

          devices = json.load(sys.stdin)["devices"]
          for runtime_devices in devices.values():
              for device in runtime_devices:
                  if device["name"].startswith("iPhone") and device.get("isAvailable", False):
                      print(device["udid"])
                      raise SystemExit
          raise SystemExit("No available iPhone simulator was found")
          ')

          echo "Booting simulator ${SIMULATOR_UDID}"
          xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

          launch_output=$(xcrun simctl launch "$SIMULATOR_UDID" "$BUNDLE_ID")
          printf '%s\n' "$launch_output" | tee build/logs/launch-simulator.log
          app_pid="${launch_output##*: }"
          sleep 10

          if ! kill -0 "$app_pid" 2>/dev/null; then
            echo "::error::${PRODUCT_NAME} exited within 10 seconds of launch."
            xcrun simctl spawn "$SIMULATOR_UDID" log show \
              --last 2m \
              --style compact \
              --predicate "process == '${PRODUCT_NAME}'" \
              > build/logs/launch-simulator-system.log || true
            exit 1
          fi

          echo "${PRODUCT_NAME} remained alive for 10 seconds after launch (PID ${app_pid})." \
            | tee -a build/logs/launch-simulator.log
          xcrun simctl io "$SIMULATOR_UDID" screenshot build/logs/launch-simulator.png
          xcrun simctl spawn "$SIMULATOR_UDID" log show \
            --last 2m \
            --style compact \
            --predicate "process == '${PRODUCT_NAME}'" \
            > build/logs/launch-simulator-system.log || true
          xcrun simctl terminate "$SIMULATOR_UDID" "$BUNDLE_ID"
          xcrun simctl shutdown "$SIMULATOR_UDID"

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Maktabah-iOS-simulator-app
          path: Maktabah-simulator-app.zip
          if-no-files-found: error

      - name: Build unsigned device IPA for inspection
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData-iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 2>&1 | tee build/logs/build-unsigned-device.log

          APP_PATH="build/DerivedData-iphoneos/Build/Products/${CONFIGURATION}-iphoneos/${PRODUCT_NAME}.app"
          test -d "$APP_PATH"
          bash Scripts/verify-embedded-frameworks.sh "$APP_PATH" \
            | tee build/logs/verify-device-frameworks.log
          test -f "$APP_PATH/Frameworks/GiphyUISDK.framework/GiphyUISDK"
          find "$APP_PATH/Frameworks" -maxdepth 3 -print \
            | tee build/logs/device-frameworks.txt
          rm -rf Payload "${PRODUCT_NAME}-unsigned.ipa"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry "${PRODUCT_NAME}-unsigned.ipa" Payload

          if unzip -l "${PRODUCT_NAME}-unsigned.ipa" | grep -E '(^|/)(seforim\.db|lexical\.db)( |$)|zayit-search-index'; then
            echo "::error::Unsigned IPA contains external Zayit Search data."
            exit 1
          fi

      - name: Upload generated Xcode project for verification
        uses: actions/upload-artifact@v4
        with:
          name: zayit-configured-xcode-project
          path: Maktabah.xcodeproj/project.pbxproj
          if-no-files-found: error

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Maktabah-iOS-unsigned-ipa-not-installable
          path: Maktabah-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/logs
          if-no-files-found: warn
