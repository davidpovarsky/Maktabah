name: Build Zayit Demo Data

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-demo-data:
    name: Build complete Otzaria-compatible ZayitSearchData demo bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Vendor/ZayitSearchPort/Rust

      - name: Create complete compatible SQLite fixtures
        run: |
          set -euo pipefail
          rm -rf build/zayit-demo
          mkdir -p build/zayit-demo/ZayitSearchData

          python3 <<'PY'
          import sqlite3
          from pathlib import Path

          root = Path('build/zayit-demo/ZayitSearchData')
          db_path = root / 'seforim.db'
          db = sqlite3.connect(db_path)
          db.executescript('''
          PRAGMA foreign_keys=OFF;
          PRAGMA user_version=1;

          CREATE TABLE category(
              id INTEGER PRIMARY KEY,
              parentId INTEGER,
              title TEXT NOT NULL,
              level INTEGER NOT NULL DEFAULT 0,
              orderIndex INTEGER NOT NULL DEFAULT 0
          );

          CREATE TABLE source(
              id INTEGER PRIMARY KEY,
              name TEXT NOT NULL
          );

          CREATE TABLE author(
              id INTEGER PRIMARY KEY,
              name TEXT NOT NULL,
              generationId INTEGER
          );

          CREATE TABLE book(
              id INTEGER PRIMARY KEY,
              categoryId INTEGER NOT NULL,
              sourceId INTEGER,
              title TEXT NOT NULL,
              heShortDesc TEXT,
              notesContent TEXT,
              orderIndex INTEGER,
              totalLines INTEGER,
              isBaseBook INTEGER DEFAULT 0,
              hasTargumConnection INTEGER DEFAULT 0,
              hasReferenceConnection INTEGER DEFAULT 0,
              hasSourceConnection INTEGER DEFAULT 0,
              hasCommentaryConnection INTEGER DEFAULT 0,
              hasOtherConnection INTEGER DEFAULT 0,
              hasAltStructures INTEGER DEFAULT 0,
              hasTeamim INTEGER DEFAULT 0,
              hasNekudot INTEGER DEFAULT 0,
              isPersonal INTEGER DEFAULT 0,
              filePath TEXT,
              fileType TEXT,
              fileSize INTEGER,
              lastModified INTEGER,
              pages TEXT,
              volume TEXT
          );

          CREATE TABLE book_author(
              bookId INTEGER NOT NULL,
              authorId INTEGER NOT NULL
          );

          CREATE TABLE tocText(
              id INTEGER PRIMARY KEY,
              text TEXT NOT NULL
          );

          CREATE TABLE line(
              id INTEGER PRIMARY KEY,
              bookId INTEGER NOT NULL,
              lineIndex INTEGER NOT NULL,
              content TEXT NOT NULL,
              heRef TEXT,
              tocEntryId INTEGER
          );

          CREATE TABLE tocEntry(
              id INTEGER PRIMARY KEY,
              bookId INTEGER NOT NULL,
              parentId INTEGER,
              textId INTEGER NOT NULL,
              level INTEGER NOT NULL DEFAULT 1,
              lineId INTEGER,
              lineIndex INTEGER,
              isLastChild INTEGER DEFAULT 0,
              hasChildren INTEGER DEFAULT 0
          );

          CREATE TABLE line_toc(
              lineId INTEGER NOT NULL,
              tocEntryId INTEGER NOT NULL
          );

          CREATE INDEX idx_category_parent ON category(parentId);
          CREATE INDEX idx_book_category ON book(categoryId);
          CREATE INDEX idx_book_title ON book(title);
          CREATE INDEX idx_book_author_book ON book_author(bookId);
          CREATE INDEX idx_book_author_author ON book_author(authorId);
          CREATE INDEX idx_line_book_index ON line(bookId, lineIndex);
          CREATE INDEX idx_line_heref ON line(heRef);
          CREATE INDEX idx_toc_book ON tocEntry(bookId);
          CREATE INDEX idx_toc_parent ON tocEntry(parentId);
          CREATE INDEX idx_toc_line ON tocEntry(lineId);
          CREATE INDEX idx_toc_text_id ON tocEntry(textId);

          CREATE VIRTUAL TABLE line_fts_with_nikud USING fts5(
              content,
              content='line',
              content_rowid='id',
              tokenize='trigram'
          );

          CREATE TRIGGER line_ai AFTER INSERT ON line BEGIN
              INSERT INTO line_fts_with_nikud(rowid, content) VALUES (new.id, new.content);
          END;
          CREATE TRIGGER line_ad AFTER DELETE ON line BEGIN
              INSERT INTO line_fts_with_nikud(line_fts_with_nikud, rowid, content)
              VALUES('delete', old.id, old.content);
          END;
          CREATE TRIGGER line_au AFTER UPDATE ON line BEGIN
              INSERT INTO line_fts_with_nikud(line_fts_with_nikud, rowid, content)
              VALUES('delete', old.id, old.content);
              INSERT INTO line_fts_with_nikud(rowid, content) VALUES (new.id, new.content);
          END;

          INSERT INTO category VALUES (1, NULL, 'ספרי הדגמה', 0, 1);
          INSERT INTO category VALUES (2, 1, 'אמונה ומידות', 1, 1);
          INSERT INTO category VALUES (3, 1, 'חכמה ודעת', 1, 2);

          INSERT INTO source VALUES (1, 'מאגר הדגמה מקומי');
          INSERT INTO author VALUES (1, 'מחבר לדוגמה', 1);
          INSERT INTO author VALUES (2, 'מחבר נוסף', 1);

          INSERT INTO book(
              id, categoryId, sourceId, title, heShortDesc, notesContent,
              orderIndex, totalLines, isBaseBook, hasAltStructures,
              hasTeamim, hasNekudot, filePath, fileType, fileSize,
              lastModified, pages, volume
          ) VALUES
          (10, 2, 1, 'ספר יסוד לדוגמה', 'ספר קטן לבדיקת הקורא והחיפוש', '',
           100, 4, 1, 1, 1, 1, 'demo/sefer-yesod', 'html', 1024, 1, '4', 'א'),
          (20, 3, 1, 'ספר נוסף לדוגמה', 'ספר נוסף לבדיקת דירוג וסינון', '',
           100, 3, 0, 1, 0, 0, 'demo/sefer-nosaf', 'html', 1024, 1, '3', 'א');

          INSERT INTO book_author VALUES (10, 1);
          INSERT INTO book_author VALUES (20, 2);

          INSERT INTO tocText VALUES (1001, 'פתיחה');
          INSERT INTO tocText VALUES (1002, 'חיים של שלום');
          INSERT INTO tocText VALUES (1003, 'אהבה ואחוה');
          INSERT INTO tocText VALUES (2001, 'חכמה ובינה');

          INSERT INTO line(id, bookId, lineIndex, content, heRef, tocEntryId) VALUES
          (101, 10, 0, '<h1>פתיחה</h1><p>שָׁלוֹם בַּיִת מיוחד ואור גדול.</p>', 'ספר יסוד לדוגמה א, א', 1101),
          (102, 10, 1, '<h2>חיים של שלום</h2><p>חיים של שלום וברכה מביאים אהבה ואחוה.</p>', 'ספר יסוד לדוגמה א, ב', 1102),
          (103, 10, 2, '<p>דרך חיים טובה מובילה לשלום אמת ולרעות.</p>', 'ספר יסוד לדוגמה א, ג', 1102),
          (104, 10, 3, '<p>אהבה אחוה שלום ורעות מאירות את הבית.</p>', 'ספר יסוד לדוגמה א, ד', 1103),
          (201, 20, 0, '<h1>חכמה ובינה</h1><p>שלום בית ואור גדול.</p>', 'ספר נוסף לדוגמה א, א', 2101),
          (202, 20, 1, '<p>חכמה בינה ודעת פותחות שערי חיים.</p>', 'ספר נוסף לדוגמה א, ב', 2101),
          (203, 20, 2, '<p>שלוה פנימית מביאה שלום.</p>', 'ספר נוסף לדוגמה א, ג', 2101);

          INSERT INTO tocEntry VALUES (1101, 10, NULL, 1001, 1, 101, 0, 0, 1);
          INSERT INTO tocEntry VALUES (1102, 10, 1101, 1002, 2, 102, 1, 0, 1);
          INSERT INTO tocEntry VALUES (1103, 10, 1101, 1003, 2, 104, 3, 1, 0);
          INSERT INTO tocEntry VALUES (2101, 20, NULL, 2001, 1, 201, 0, 1, 0);

          INSERT INTO line_toc VALUES (101, 1101);
          INSERT INTO line_toc VALUES (102, 1102);
          INSERT INTO line_toc VALUES (103, 1102);
          INSERT INTO line_toc VALUES (104, 1103);
          INSERT INTO line_toc VALUES (201, 2101);
          INSERT INTO line_toc VALUES (202, 2101);
          INSERT INTO line_toc VALUES (203, 2101);

          INSERT INTO line_fts_with_nikud(line_fts_with_nikud) VALUES('rebuild');
          ''')
          db.commit()
          db.close()

          lexical = sqlite3.connect(root / 'lexical.db')
          lexical.executescript('''
          CREATE TABLE base(id INTEGER PRIMARY KEY, value TEXT NOT NULL);
          CREATE TABLE surface(id INTEGER PRIMARY KEY, base_id INTEGER NOT NULL, value TEXT NOT NULL);
          CREATE TABLE variant(id INTEGER PRIMARY KEY, value TEXT NOT NULL);
          CREATE TABLE surface_variant(surface_id INTEGER NOT NULL, variant_id INTEGER NOT NULL);

          INSERT INTO base VALUES (1, 'שלום');
          INSERT INTO surface VALUES (1, 1, 'שלום');
          INSERT INTO surface VALUES (2, 1, 'שלומים');
          INSERT INTO variant VALUES (1, 'שלוה');
          INSERT INTO variant VALUES (2, 'שלווה');
          INSERT INTO surface_variant VALUES (1, 1);
          INSERT INTO surface_variant VALUES (1, 2);

          INSERT INTO base VALUES (2, 'חיים');
          INSERT INTO surface VALUES (3, 2, 'חיים');
          ''')
          lexical.commit()
          lexical.close()
          PY

      - name: Validate Otzaria-compatible schema and content
        run: |
          set -euo pipefail
          python3 <<'PY'
          import sqlite3
          p = 'build/zayit-demo/ZayitSearchData/seforim.db'
          db = sqlite3.connect(p)
          required = ['category','book','author','book_author','source','line','tocEntry','tocText','line_toc','line_fts_with_nikud']
          actual = {r[0] for r in db.execute("SELECT name FROM sqlite_master WHERE type IN ('table','view')")}
          missing = [x for x in required if x not in actual]
          assert not missing, missing
          assert db.execute('SELECT COUNT(*) FROM book').fetchone()[0] == 2
          assert db.execute('SELECT COUNT(*) FROM line').fetchone()[0] == 7
          assert db.execute("SELECT COUNT(*) FROM line_fts_with_nikud WHERE line_fts_with_nikud MATCH ?", ('חיים של שלום',)).fetchone()[0] >= 1
          assert db.execute('SELECT COUNT(*) FROM tocEntry').fetchone()[0] >= 4
          assert db.execute('SELECT COUNT(*) FROM author').fetchone()[0] >= 2
          db.close()
          PY

      - name: Build demo Zayit search index
        run: |
          set -euo pipefail
          cargo run --release \
            --manifest-path Vendor/ZayitSearchPort/Rust/Cargo.toml \
            --bin zayit-index-builder -- \
            "$PWD/build/zayit-demo/ZayitSearchData/seforim.db" \
            "$PWD/build/zayit-demo/ZayitSearchData/zayit-search-index"

      - name: Verify bundle and Rust search smoke tests
        run: |
          set -euo pipefail
          test -f build/zayit-demo/ZayitSearchData/seforim.db
          test -f build/zayit-demo/ZayitSearchData/lexical.db
          test -f build/zayit-demo/ZayitSearchData/zayit-search-index/meta.json
          test -f build/zayit-demo/ZayitSearchData/zayit-search-index/zayit-index-metadata.json

          cargo test \
            --manifest-path Vendor/ZayitSearchPort/Rust/Cargo.toml \
            --test fixture_index_search

          find build/zayit-demo/ZayitSearchData -maxdepth 3 -type f -print

      - name: Create download ZIP
        run: |
          set -euo pipefail
          cd build/zayit-demo
          zip -r ZayitSearchData-Demo.zip ZayitSearchData
          test -s ZayitSearchData-Demo.zip

      - name: Upload demo data artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZayitSearchData-Demo-Full
          path: build/zayit-demo/ZayitSearchData-Demo.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
