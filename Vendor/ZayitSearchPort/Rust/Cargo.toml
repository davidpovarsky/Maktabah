[package]
name = "maktabah_zayit_search"
version = "0.2.0"
edition = "2021"
license = "AGPL-3.0-or-later"

[lib]
crate-type = ["staticlib", "rlib"]

[[bin]]
name = "zayit-index-builder"
path = "src/bin/zayit_index_builder.rs"

[dependencies]
anyhow = "1"
once_cell = "1"
parking_lot = "0.12"
regex = "1"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tantivy = "0.22"
thiserror = "2"
unicode-segmentation = "1"

[dev-dependencies]
tempfile = "3"
